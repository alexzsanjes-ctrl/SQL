services:

  db:
    image: mysql:8
    ports:
      - '3306:3306'
    restart: always
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./data:/var/lib/mysql

    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_DATABASE: mydb
      MYSQL_USER: vasya
      MYSQL_PASSWORD: qwerty123
